name: Generate Speaker Cards

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Validate required secrets
        env:
          SESSIONIZE_API_SLUG: ${{ secrets.SESSIONIZE_API_SLUG }}
          GDRIVE_CREDENTIALS_BASE64: ${{ secrets.GDRIVE_CREDENTIALS_BASE64 }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          missing=()
          [ -z "$SESSIONIZE_API_SLUG" ] && missing+=("SESSIONIZE_API_SLUG")
          [ -z "$GDRIVE_CREDENTIALS_BASE64" ] && missing+=("GDRIVE_CREDENTIALS_BASE64")
          [ -z "$GDRIVE_FOLDER_ID" ] && missing+=("GDRIVE_FOLDER_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Write Google credentials file
        env:
          GDRIVE_CREDENTIALS_BASE64: ${{ secrets.GDRIVE_CREDENTIALS_BASE64 }}
        run: |
          echo "$GDRIVE_CREDENTIALS_BASE64" | base64 --decode > /tmp/gdrive-creds.json
          python3 -c "import json; json.load(open('/tmp/gdrive-creds.json'))" || { echo "::error::Invalid JSON in GDRIVE_CREDENTIALS_BASE64"; exit 1; }

      - name: Generate cards and upload
        env:
          SESSIONIZE_API_SLUG: ${{ secrets.SESSIONIZE_API_SLUG }}
          GDRIVE_CREDENTIALS_PATH: /tmp/gdrive-creds.json
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: uv run python src/generate_cards.py --upload

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gdrive-creds.json
