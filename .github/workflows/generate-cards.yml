name: Generate Speaker Cards

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-speakers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Cache output directory
        id: cache-output
        uses: actions/cache@v5
        with:
          path: output
          key: ${{ runner.os }}-output-${{ github.job }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-output-${{ github.job }}-
            ${{ runner.os }}-output-

      - name: Generate speaker cards
        env:
          SESSIONIZE_API_SLUG: ${{ secrets.SESSIONIZE_API_SLUG }}
        run: uv run python src/generate_cards.py --speakers

      - name: Upload speaker artifacts
        uses: actions/upload-artifact@v6
        with:
          name: speaker-configs
          path: output/*.png
          if-no-files-found: ignore

  generate-sponsors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Cache output directory
        uses: actions/cache@v5
        with:
          path: output
          key: ${{ runner.os }}-output-${{ github.job }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-output-${{ github.job }}-
            ${{ runner.os }}-output-

      - name: Validate Sponsor API secrets
        env:
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
        run: |
          if [ -z "$API_AUTH_TOKEN" ]; then
            echo "::error::API_AUTH_TOKEN secret is missing or empty. Skipping sponsor generation would fail logic later."
            exit 1
          fi

      - name: Generate sponsor cards
        env:
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
        run: uv run python src/generate_cards.py --sponsors

      - name: Upload sponsor artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sponsor-configs
          path: output/sponsor-*.png
          if-no-files-found: ignore

  finalize:
    runs-on: ubuntu-latest
    needs: [generate-speakers, generate-sponsors]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Cache output directory
        uses: actions/cache@v5
        with:
          path: output
          key: ${{ runner.os }}-output-${{ github.job }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-output-${{ github.job }}-
            ${{ runner.os }}-output-

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: output
          merge-multiple: true

      - name: Validate required secrets
        env:
          GDRIVE_CREDENTIALS_BASE64: ${{ secrets.GDRIVE_CREDENTIALS_BASE64 }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          missing=()
          [ -z "$GDRIVE_CREDENTIALS_BASE64" ] && missing+=("GDRIVE_CREDENTIALS_BASE64")
          [ -z "$GDRIVE_FOLDER_ID" ] && missing+=("GDRIVE_FOLDER_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Write Google credentials file
        env:
          GDRIVE_CREDENTIALS_BASE64: ${{ secrets.GDRIVE_CREDENTIALS_BASE64 }}
        run: |
          echo "$GDRIVE_CREDENTIALS_BASE64" | base64 --decode > /tmp/gdrive-creds.json
          python3 -c "import json; json.load(open('/tmp/gdrive-creds.json'))" || { echo "::error::Invalid JSON in GDRIVE_CREDENTIALS_BASE64"; exit 1; }

      - name: Generate PDFs and Upload
        env:
          SESSIONIZE_API_SLUG: ${{ secrets.SESSIONIZE_API_SLUG }}
          GDRIVE_CREDENTIALS_PATH: /tmp/gdrive-creds.json
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: uv run python src/generate_cards.py --pdf --upload

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gdrive-creds.json
