name: Generate Speaker Cards

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Write Google credentials file
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: printenv GDRIVE_CREDENTIALS_JSON > /tmp/gdrive-creds.json

      - name: Generate cards and upload
        env:
          SESSIONIZE_API_SLUG: ${{ secrets.SESSIONIZE_API_SLUG }}
          GDRIVE_CREDENTIALS_PATH: /tmp/gdrive-creds.json
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: uv run python src/generate_cards.py --upload

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gdrive-creds.json
